name: Publish Logseq Plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to upload assets to
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run ci

      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="v$(node -p "require('./package.json').version")"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        id: build_zip
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.vars.outputs.tag_name }}"
          PLUGIN_NAME="$(node -p "require('./package.json').name")"
          ZIP_NAME="${PLUGIN_NAME}-${TAG_NAME}.zip"

          mkdir -p release

          FILES=(index.html index.js package.json)
          if [ -f "logo.png" ]; then FILES+=(logo.png); fi
          if [ -f "README.md" ]; then FILES+=(README.md); fi

          zip -r "release/${ZIP_NAME}" "${FILES[@]}"
          echo "zip_path=release/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Smoke test release archive
        shell: bash
        run: |
          set -euo pipefail
          unzip -t "${{ steps.build_zip.outputs.zip_path }}"

      - name: Generate and verify checksums and signatures
        id: verify_artifacts
        shell: bash
        run: |
          set -euo pipefail
          ZIP_PATH="${{ steps.build_zip.outputs.zip_path }}"
          ZIP_DIR="$(dirname "$ZIP_PATH")"
          ZIP_FILE="$(basename "$ZIP_PATH")"

          CHECKSUM_PATH="${ZIP_PATH}.sha256"
          SIGNATURE_PATH="${ZIP_PATH}.sig"
          PUBLIC_KEY_PATH="${ZIP_PATH}.pub"
          PRIVATE_KEY_PATH="${ZIP_DIR}/signing-private.pem"

          sha256sum "$ZIP_PATH" > "$CHECKSUM_PATH"
          (cd "$ZIP_DIR" && sha256sum -c "$(basename "$CHECKSUM_PATH")")

          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$PRIVATE_KEY_PATH"
          openssl rsa -pubout -in "$PRIVATE_KEY_PATH" -out "$PUBLIC_KEY_PATH"
          openssl dgst -sha256 -sign "$PRIVATE_KEY_PATH" -out "$SIGNATURE_PATH" "$ZIP_PATH"
          openssl dgst -sha256 -verify "$PUBLIC_KEY_PATH" -signature "$SIGNATURE_PATH" "$ZIP_PATH"

          rm -f "$PRIVATE_KEY_PATH"

          echo "checksum_path=${CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"
          echo "signature_path=${SIGNATURE_PATH}" >> "$GITHUB_OUTPUT"
          echo "public_key_path=${PUBLIC_KEY_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          files: |
            ${{ steps.build_zip.outputs.zip_path }}
            ${{ steps.verify_artifacts.outputs.checksum_path }}
            ${{ steps.verify_artifacts.outputs.signature_path }}
            ${{ steps.verify_artifacts.outputs.public_key_path }}
          overwrite_files: true
