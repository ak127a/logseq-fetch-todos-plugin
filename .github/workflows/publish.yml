name: Publish Logseq Plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to upload assets to
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="v$(node -p "require('./package.json').version")"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        id: build_zip
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.vars.outputs.tag_name }}"
          PLUGIN_NAME="$(node -p "require('./package.json').name")"
          ZIP_NAME="${PLUGIN_NAME}-${TAG_NAME}.zip"

          mkdir -p release

          FILES=(index.html index.js package.json)
          if [ -f "logo.png" ]; then FILES+=(logo.png); fi
          if [ -f "README.md" ]; then FILES+=(README.md); fi

          zip -r "release/${ZIP_NAME}" "${FILES[@]}"
          echo "zip_path=release/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          files: ${{ steps.build_zip.outputs.zip_path }}
          overwrite_files: true
