name: Auto Create Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release token
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing RELEASE_PAT secret (repo scope)."
            echo "Add RELEASE_PAT so release events can trigger publish workflow."
            exit 1
          fi

      - name: Resolve version tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --notes "Automated release for version ${{ steps.vars.outputs.version }}"

      - name: Skip when release already exists
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Release ${{ steps.vars.outputs.tag }} already exists."
